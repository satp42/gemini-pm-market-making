services:
  postgres:
    image: postgres:16
    container_name: gemini_mm_postgres
    environment:
      POSTGRES_DB: gemini_mm
      POSTGRES_USER: gemini
      POSTGRES_PASSWORD: gemini_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gemini -d gemini_mm"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
